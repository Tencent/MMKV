name: KMP CI

on:
  pull_request:
    paths:
      - ".github/workflows/kmp-ci.yml"
      - "KMP/**"
      - "Core/**"
      - "iOS/MMKV/MMKV/**"
      - "README.md"
      - "CHANGELOG.md"
  push:
    branches:
      - dev
      - dev_kmp
    paths:
      - ".github/workflows/kmp-ci.yml"
      - "KMP/**"
      - "Core/**"
      - "iOS/MMKV/MMKV/**"
      - "README.md"
      - "CHANGELOG.md"

jobs:
  kmp:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            shell: bash
            command: ./gradlew :mmkv:desktopTest :mmkv:linuxX64Test :mmkv:compileKotlinLinuxArm64 :mmkv:compileTestKotlinLinuxArm64 :mmkv:testDebugUnitTest
          - name: macOS
            os: macos-latest
            shell: bash
            command: ./gradlew :mmkv:desktopTest :mmkv:macosX64Test :mmkv:iosX64Test
          - name: Windows
            os: windows-latest
            shell: pwsh
            command: ./gradlew.bat :mmkv:desktopTest :mmkv:mingwX64Test

    defaults:
      run:
        shell: ${{ matrix.shell }}
        working-directory: KMP

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install CocoaPods
        if: runner.os == 'macOS'
        run: sudo gem install cocoapods

      - name: Verify build and tests
        run: ${{ matrix.command }}
