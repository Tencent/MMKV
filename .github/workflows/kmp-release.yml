name: KMP Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: KMP
    env:
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_USERNAME: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_PASSWORD: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
      ORG_GRADLE_PROJECT_SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish Linux-hosted artifacts
        run: >
          ./gradlew
          :mmkv:publishKotlinMultiplatformPublicationToSonatypeRepository
          :mmkv:publishAndroidReleasePublicationToSonatypeRepository
          :mmkv:publishDesktopPublicationToSonatypeRepository
          :mmkv:publishLinuxX64PublicationToSonatypeRepository
          :mmkv:publishDesktopNativePublicationToSonatypeRepository

  publish-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
        working-directory: KMP
    env:
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_USERNAME: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_PASSWORD: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
      ORG_GRADLE_PROJECT_SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Publish Apple artifacts
        run: >
          ./gradlew
          :mmkv:publishIosArm64PublicationToSonatypeRepository
          :mmkv:publishIosSimulatorArm64PublicationToSonatypeRepository
          :mmkv:publishIosX64PublicationToSonatypeRepository
          :mmkv:publishMacosArm64PublicationToSonatypeRepository
          :mmkv:publishMacosX64PublicationToSonatypeRepository
          :mmkv:publishDesktopNativePublicationToSonatypeRepository

  publish-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: KMP
    env:
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_USERNAME: ${{ secrets.SONATYPE_NEXUS_USERNAME }}
      ORG_GRADLE_PROJECT_SONATYPE_NEXUS_PASSWORD: ${{ secrets.SONATYPE_NEXUS_PASSWORD }}
      ORG_GRADLE_PROJECT_SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish Windows artifacts
        run: >
          ./gradlew.bat
          :mmkv:publishMingwX64PublicationToSonatypeRepository
          :mmkv:publishDesktopNativePublicationToSonatypeRepository
